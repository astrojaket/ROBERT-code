name: robert-exoplanets
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - pip
  - cxx-compiler
  - cmake>=3.26
  - ninja
  - numpy=2.2.6
  - pydantic>=2.7
  - pyyaml>=6.0
  - scipy>=1.14
  - numba=0.61.2
  - matplotlib=3.10.3
  # PSIS leave-one-out retrieval diagnostics and pointwise ELPD comparison.
  - arviz>=0.21,<2
  - h5py>=3.12
  # Conda-forge MultiNest is built against MPICH; keep mpi4py on the same ABI.
  - mpich>=4.3,<5
  - mpi4py=4.1.2
  - multinest=3.10
  - pymultinest=2.12
  - pip:
      - exo-k==1.3.1
      - ultranest==4.5.0
      - pyfastchem==3.1.2
      - -e .[complete]
