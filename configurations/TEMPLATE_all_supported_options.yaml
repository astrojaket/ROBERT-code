# ROBERT complete user-editable template (schema version 2).
#
# Start every new project by copying this file. Keep ONLY one active choice for
# each model block. Commented entries are valid options or priors but are not
# included in the retrieval until uncommented and placed in `parameters`.
# ROBERT rejects unknown active keys deliberately, so a typo cannot change the
# science model silently.

schema_version: 2

# =============================================================================
# PATHS: ALL MACHINE-SPECIFIC LOCATIONS LIVE HERE.
# Relative paths resolve beside this YAML. ROBERT creates ./outputs, ./scratch,
# and ./opacity_cache automatically, so they do not need to be configured.
# Environment variables such as ${ROBERT_DATA_ROOT} are supported.
# =============================================================================
paths:
  project_directory: .
  observations_directory: /path/to/observations
  fastchem_directory: /path/to/fastchem
  k_table_directory: /path/to/opacity
  optical_constants_directory: /path/to/optical_constants

# =============================================================================
# RUN IDENTITY
# =============================================================================
run:
  name: change-this-run-name
  description: Describe the science question, data selection, and model.

# =============================================================================
# SYSTEM PROPERTIES
# SI units: radius [m], mass [kg], gravity [m s-2], temperature [K].
# Supply planet mass+radius OR direct gravity.
# =============================================================================
bodies:
  planet:
    name: WASP-69b
    radius_m: 75781520.0
    mass_kg: 4.935138e26
    # gravity_m_s2: 11.0       # Alternative to mass_kg.
  star:
    name: WASP-69
    radius_m: 565568100.0
    effective_temperature_k: 4750.0
    log_g_cgs: 4.5
    metallicity_dex: 0.0
    spectrum_model: phoenix    # Alternative: blackbody

# =============================================================================
# DATA PROPERTIES
# `loader` selects a supported published data reader. `datasets` must be
# statistically independent likelihood terms. Do not include WASP-69b `avg`
# with F322W2 and F444W: it is their derived six-bin overlap average.
# =============================================================================
observations:
  loader: schlawin2024_wasp69b   # Alternatives: wiser2025_wasp80b, robert_npz
  datasets: [f322w2, f444w, lrs]
  verify_checksum: true
  miri_offset_parameter: null    # Legacy shorthand; prefer dataset_options below.
  # Every selected dataset may have independent or shared nuisance parameters.
  # `uncertainty_scale` is a fixed multiplier. A retrieved scale multiplies it;
  # additive jitter is then combined in quadrature. Omit unused controls.
  dataset_options: {}
    # Replace `{}` with a mapping like the examples below.
    # f322w2:
    #   offset_parameter: f322w2_offset
    #   uncertainty_scale: 1.0
    #   uncertainty_scale_parameter: f322w2_error_scale
    #   jitter_parameter: f322w2_jitter
    # f444w:
    #   offset_parameter: nircam_offset  # Sharing a name ties datasets together.
    # lrs:
    #   offset_parameter: miri_offset
    #   uncertainty_scale: 1.15          # Fixed 15% inflation.
    #   uncertainty_scale_parameter: miri_error_scale
    #   jitter_parameter: miri_jitter
  # path is populated from paths.observations_directory.

# =============================================================================
# ATMOSPHERE PROPERTIES
# =============================================================================
atmosphere:
  pressure:
    bottom_bar: 100.0
    top_bar: 1.0e-6
    layers: 80

  temperature:
    # Choose ONE supported profile.
    model: parmentier_guillot_2014
    internal_temperature_k: 100.0
    # model: isothermal
    # parameter_name: temperature
    # model: tabulated
    # profile_path: inputs/my_temperature_profile.csv
    # pressure_column: pressure_bar
    # temperature_column: temperature_K
    # pressure_unit: bar
    # extrapolation: clip          # Alternatives: raise, clip
    # model: madhusudhan_seager_2009
    # pressure_unit: bar
    # reference_pressure: 1.0e-6   # Optional; defaults to the grid top.
    # p1_parameter: P1             # P1/P2/P3 are log10 pressure in pressure_unit.
    # p2_parameter: P2
    # p3_parameter: P3
    # t0_parameter: T0
    # alpha1_parameter: alpha1
    # alpha2_parameter: alpha2
    # model: spline
    # knot_pressure: [1.0e-6, 1.0e-4, 1.0e-2, 1.0, 100.0]
    # parameter_names: [T_0, T_1, T_2, T_3, T_4]
    # knot_temperature_k: [900, 1050, 1300, 1650, 1800] # Fixed alternative.
    # pressure_unit: bar
    # extrapolation: clip

  chemistry:
    # Choose equilibrium FastChem OR free, constant-with-altitude chemistry.
    model: fastchem_equilibrium
    metallicity_parameter: metallicity
    carbon_to_oxygen_parameter: CtoO
    # fastchem_path is populated from paths.fastchem_directory.
    species:
      - {label: H2O, fastchem_name: H2O1}
      - {label: CO2, fastchem_name: C1O2}
      - {label: CO,  fastchem_name: C1O1}
      - {label: CH4, fastchem_name: C1H4}
      - {label: NH3, fastchem_name: H3N1}
      - {label: SO2, fastchem_name: O2S1}
      - {label: H2,  fastchem_name: H2}
      - {label: He,  fastchem_name: He}
    # Optional constant-abundance overrides layered onto equilibrium chemistry.
    constant_log10_vmr_parameters: {SO2: log_SO2}
    # model: free
    # species: [H2O, CO2, CO, CH4, NH3, HCN]
    # parameter_mode: log10       # Parameters are log10(VMR); alternative: linear.
    # parameter_names: {H2O: log_H2O, CO2: log_CO2, CO: log_CO, CH4: log_CH4, NH3: log_NH3, HCN: log_HCN}
    # fixed_mixing_ratios: {}     # Species listed here need no retrieval parameter.
    # background_species: [H2, He]
    # background_fractions: [0.8547, 0.1453]
    # fill_background: true
    # excess_policy: raise        # Alternative: normalize.
    # Optional composition-agnostic filler. Make this the sole background gas;
    # it has no opacity and its retrieved mass controls the bulk MMW.
    # phantom_species: phantom
    # phantom_mean_molecular_weight_parameter: phantom_mmw

# =============================================================================
# CLOUD PROPERTIES
# Choose ONE. Cloud parameters must be present in `parameters` only when the
# matching cloud model is active.
# =============================================================================
clouds:
  model: none

  # Shared emission/transmission grey deck plus well-mixed power-law haze:
  # The same vertical extinction, absorption/scattering split, and parameters
  # are used in both modes. Transmission removes scattered light from the
  # direct beam; emission uses the selected multiple-scattering backend.
  # model: deck_haze
  # log10_cloud_top_pressure_bar_parameter: log_cloud_top_pressure_bar
  # log10_cloud_optical_depth_parameter: log_cloud_optical_depth
  # log10_haze_mass_extinction_parameter: log_haze_mass_extinction
  # haze_slope_parameter: haze_slope
  # haze_reference_wavelength_micron: 1.0
  # deck_single_scattering_albedo: 0.0
  # deck_asymmetry_factor: 0.0
  # haze_single_scattering_albedo: 1.0
  # haze_asymmetry_factor: 0.0
  # multiple_scattering_backend: sh4 # Alternatives: none, two_stream, toon_hemispheric_mean, p3.

  # Shared emission/transmission fixed-material Mie cloud. Both geometries use
  # the same lognormal particle extinction, albedo, phase moments, and vertical
  # condensate profile; only the downstream ray geometry differs.
  # model: mie_catalog
  # material: MgSiO3
  # particle_density_kg_m3: 3200.0
  # geometric_stddev: 1.0
  # quadrature_points: 1
  # multiple_scattering_backend: sh4
  # optical_constants_path is populated from paths.optical_constants_directory.

  # Shared emission/transmission retrieved refractive-index Mie cloud:
  # model: mie_direct_nk
  # refractive_index_wavelength_micron: [2.4, 4.0, 5.5, 7.0, 9.0, 12.0]
  # real_index_parameter_names: [cloud_n_0, cloud_n_1, cloud_n_2, cloud_n_3, cloud_n_4, cloud_n_5]
  # log10_imaginary_index_parameter_names: [cloud_logk_0, cloud_logk_1, cloud_logk_2, cloud_logk_3, cloud_logk_4, cloud_logk_5]
  # particle_density_kg_m3: 3200.0
  # geometric_stddev: 1.0
  # quadrature_points: 1
  # multiple_scattering_backend: sh4

# =============================================================================
# PROJECTED-DISK EMISSION
# The top-level atmosphere/clouds define the primary (hot) column. Regional
# overrides inherit every omitted field. Two-region and dilution modes require
# their fraction parameter in `parameters` with bounds inside [0, 1].
# =============================================================================
disk_emission:
  model: one_region
  # Diluted one-column alternative:
  # model: diluted_one_region
  # dilution_parameter: dayside_dilution
  # Two-column alternative ("2tp" is accepted as an alias):
  # model: two_region
  # hot_fraction_parameter: hot_area_fraction
  # hot_region: {}                  # Inherits the top-level atmosphere/clouds.
  # cold_region:
  #   atmosphere:
  #     temperature:
  #       model: isothermal
  #       parameter_name: cold_temperature
  #     chemistry:                  # Omit to share top-level chemistry.
  #       model: free
  #       species: [H2O, CO2, CO, CH4, NH3, SO2]
  #       parameter_names: {H2O: cold_log_H2O, CO2: cold_log_CO2, CO: cold_log_CO, CH4: cold_log_CH4, NH3: cold_log_NH3, SO2: cold_log_SO2}
  #       background_species: [H2, He]
  #       background_fractions: [0.8547, 0.1453]
  #   clouds:
  #     model: none

# =============================================================================
# OPACITY AND RADIATIVE TRANSFER
# =============================================================================
opacity:
  format: exomol_kta          # Alternative: exomol_cross_section_hdf
  resolution: R1000           # Alternative: R15000
  species: [H2O, CO2, CO, CH4, NH3, SO2]
  binning:
    num: 300
    use_rebin: false
    remove_zeros: true
    g_points: 8               # Used by exomol_cross_section_hdf only.
  # path is populated from paths.k_table_directory; cache defaults locally.

radiative_transfer:
  model: emission             # Alternative: transmission
  geometry:
    model: normal_emission    # Alternative: gauss_legendre_disk
    points: 4                 # Used by gauss_legendre_disk only.
  include_rayleigh: true
  gas_combination: random_overlap  # Alternative: equivalent_extinction
  thermal_integration_backend: auto # Alternatives: numpy, numba
  # Transmission-only controls:
  reference_pressure_bar: 1.0
  radius_scale_parameter: null # Example: radius_scale; add it to parameters.
  gravity_model: inverse_square # Alternative: constant
  impact_quadrature_order: 8

likelihood:
  model: gaussian
  include_normalization: true

# =============================================================================
# RETRIEVAL PARAMETERS AND PRIORS
# Only uncomment/retain parameters required by the active physics above.
# `value` is used by run_forward.py; retrievals use the prior.
# =============================================================================
parameters:
  # --- PG14 temperature + FastChem equilibrium (active in this template) ---
  - {name: metallicity, label: log10(Z/Z_sun), unit: dex, prior: {type: uniform, lower: -1.0, upper: 2.0}, value: 0.5}
  - {name: CtoO, label: C/O, prior: {type: uniform, lower: 0.0, upper: 1.0}, value: 0.5}
  - {name: kappa_IR, unit: m2 kg-1, prior: {type: log_uniform, lower: 1.0e-5, upper: 1.0}, value: 0.00316}
  - {name: gamma1, prior: {type: log_uniform, lower: 1.0e-4, upper: 100.0}, value: 0.1}
  - {name: gamma2, prior: {type: log_uniform, lower: 1.0e-4, upper: 100.0}, value: 0.1}
  - {name: T_irr, unit: K, prior: {type: uniform, lower: 800.0, upper: 2200.0}, value: 1500.0}
  - {name: alpha, prior: {type: uniform, lower: 0.0, upper: 1.0}, value: 0.5}

  # --- Isothermal alternative: remove the five PG14 parameters above ---
  # - {name: temperature, unit: K, prior: {type: uniform, lower: 800.0, upper: 2200.0}, value: 1500.0}

  # --- Madhusudhan-Seager 2009 alternative: remove the PG14 parameters ---
  # - {name: P1, label: log10(P1/bar), prior: {type: uniform, lower: -6.0, upper: 1.5}, value: -3.0}
  # - {name: P2, label: log10(P2/bar), prior: {type: uniform, lower: -6.0, upper: 1.5}, value: -2.0}
  # - {name: P3, label: log10(P3/bar), prior: {type: uniform, lower: -2.0, upper: 2.0}, value: 0.5}
  # - {name: T0, unit: K, prior: {type: uniform, lower: 500.0, upper: 3500.0}, value: 1200.0}
  # - {name: alpha1, prior: {type: uniform, lower: 0.02, upper: 2.0}, value: 0.4}
  # - {name: alpha2, prior: {type: uniform, lower: 0.02, upper: 2.0}, value: 0.4}

  # --- Five-knot spline alternative: one parameter per configured knot ---
  # - {name: T_0, unit: K, prior: {type: uniform, lower: 400.0, upper: 3500.0}, value: 900.0}
  # - {name: T_1, unit: K, prior: {type: uniform, lower: 400.0, upper: 3500.0}, value: 1050.0}
  # - {name: T_2, unit: K, prior: {type: uniform, lower: 400.0, upper: 3500.0}, value: 1300.0}
  # - {name: T_3, unit: K, prior: {type: uniform, lower: 400.0, upper: 3500.0}, value: 1650.0}
  # - {name: T_4, unit: K, prior: {type: uniform, lower: 400.0, upper: 3500.0}, value: 1800.0}

  # --- Free-chemistry alternative: remove metallicity and CtoO ---
  # - {name: log_H2O, label: log10(H2O VMR), prior: {type: uniform, lower: -12.0, upper: -1.0}, value: -3.0}
  # - {name: log_CO2, label: log10(CO2 VMR), prior: {type: uniform, lower: -12.0, upper: -1.0}, value: -5.0}
  # - {name: log_CO, label: log10(CO VMR), prior: {type: uniform, lower: -12.0, upper: -1.0}, value: -4.0}
  # - {name: log_CH4, label: log10(CH4 VMR), prior: {type: uniform, lower: -12.0, upper: -1.0}, value: -6.0}
  # - {name: log_NH3, label: log10(NH3 VMR), prior: {type: uniform, lower: -12.0, upper: -1.0}, value: -7.0}
  # - {name: log_HCN, label: log10(HCN VMR), prior: {type: uniform, lower: -12.0, upper: -1.0}, value: -8.0}

  # --- Centered-log-ratio free chemistry alternative ---
  # Use model: free, parameter_mode: log10, fill_background: true. Every
  # retrieved abundance must use the same CLR group and bounds. The configured
  # background is the final, symmetrically treated composition category.
  # - {name: log_H2O, label: log10(H2O VMR), prior: {type: centered_log_ratio, lower: -12.0, upper: 0.0, group: composition}, value: -3.0}
  # - {name: log_CO2, label: log10(CO2 VMR), prior: {type: centered_log_ratio, lower: -12.0, upper: 0.0, group: composition}, value: -3.0}
  # - {name: log_CH4, label: log10(CH4 VMR), prior: {type: centered_log_ratio, lower: -12.0, upper: 0.0, group: composition}, value: -3.0}

  # --- Optional phantom-background mass (with phantom chemistry above) ---
  # This is the molecular mass in atomic mass units, not a separate atmosphere MMW.
  # - {name: phantom_mmw, label: Phantom molecular mass, unit: amu, prior: {type: uniform, lower: 2.3, upper: 100.0}, value: 28.0}

  # --- Optional transmission reference-radius scale ---
  # - {name: radius_scale, prior: {type: uniform, lower: 0.98, upper: 1.02}, value: 1.0}

  # --- Shared deck+haze cloud parameters ---
  # Broad starting ranges are shown. Constrain cloud-top pressure to the active
  # pressure grid and narrow priors when external information warrants it.
  # `log_haze_mass_extinction` is log10(cm2/g of bulk atmosphere), not a
  # condensate-only opacity. The 50-live-point validation used narrower ranges:
  # cloud top [-4,-2], deck tau [-2,0], haze extinction [-5.5,-3.5], slope [-6,-1].
  # - {name: log_cloud_top_pressure_bar, label: log10 cloud-top pressure (bar), unit: dex, prior: {type: uniform, lower: -6.0, upper: 2.0}, value: -3.0}
  # - {name: log_cloud_optical_depth, label: log10 cloud-deck optical depth, unit: dex, prior: {type: uniform, lower: -4.0, upper: 2.0}, value: -1.0}
  # - {name: log_haze_mass_extinction, label: log10 haze mass extinction (cm2/g), unit: dex, prior: {type: uniform, lower: -10.0, upper: 0.0}, value: -4.3}
  # - {name: haze_slope, label: Haze wavelength slope, prior: {type: uniform, lower: -8.0, upper: 2.0}, value: -4.0}

  # --- Optional FastChem constant-abundance override ---
  - {name: log_SO2, label: log10(SO2 VMR), prior: {type: uniform, lower: -10.0, upper: -4.0}, value: -8.0}

  # --- Dataset nuisance parameters referenced by observations.dataset_options ---
  # - {name: f322w2_offset, unit: eclipse_depth, prior: {type: uniform, lower: -5.0e-4, upper: 5.0e-4}, value: 0.0}
  # - {name: f322w2_error_scale, prior: {type: log_uniform, lower: 0.5, upper: 5.0}, value: 1.0}
  # - {name: f322w2_jitter, unit: eclipse_depth, prior: {type: log_uniform, lower: 1.0e-7, upper: 1.0e-3}, value: 1.0e-5}
  # - {name: miri_offset, unit: eclipse_depth, prior: {type: uniform, lower: -5.0e-4, upper: 5.0e-4}, value: 0.0}
  # - {name: miri_error_scale, prior: {type: log_uniform, lower: 0.5, upper: 5.0}, value: 1.0}
  # - {name: miri_jitter, unit: eclipse_depth, prior: {type: log_uniform, lower: 1.0e-7, upper: 1.0e-3}, value: 1.0e-5}

  # --- Mie catalogue/direct-nk cloud-structure parameters ---
  # - {name: log_cloud_mass_fraction, prior: {type: uniform, lower: -12.0, upper: -2.0}, value: -7.0}
  # - {name: log_cloud_radius_micron, prior: {type: uniform, lower: -3.0, upper: 1.0}, value: -1.0}
  # - {name: log_cloud_top_pressure_bar, prior: {type: uniform, lower: -6.0, upper: -2.0}, value: -4.0}
  # - {name: log_cloud_base_pressure_bar, prior: {type: uniform, lower: -1.0, upper: 2.0}, value: 0.5}

  # --- Direct-n/k only: one pair for every refractive-index node ---
  # - {name: cloud_n_0, prior: {type: uniform, lower: 1.0, upper: 3.0}, value: 1.6}
  # - {name: cloud_n_1, prior: {type: uniform, lower: 1.0, upper: 3.0}, value: 1.6}
  # - {name: cloud_n_2, prior: {type: uniform, lower: 1.0, upper: 3.0}, value: 1.6}
  # - {name: cloud_n_3, prior: {type: uniform, lower: 1.0, upper: 3.0}, value: 1.6}
  # - {name: cloud_n_4, prior: {type: uniform, lower: 1.0, upper: 3.0}, value: 1.6}
  # - {name: cloud_n_5, prior: {type: uniform, lower: 1.0, upper: 3.0}, value: 1.6}
  # - {name: cloud_logk_0, prior: {type: uniform, lower: -6.0, upper: 0.0}, value: -3.0}
  # - {name: cloud_logk_1, prior: {type: uniform, lower: -6.0, upper: 0.0}, value: -3.0}
  # - {name: cloud_logk_2, prior: {type: uniform, lower: -6.0, upper: 0.0}, value: -3.0}
  # - {name: cloud_logk_3, prior: {type: uniform, lower: -6.0, upper: 0.0}, value: -3.0}
  # - {name: cloud_logk_4, prior: {type: uniform, lower: -6.0, upper: 0.0}, value: -3.0}
  # - {name: cloud_logk_5, prior: {type: uniform, lower: -6.0, upper: 0.0}, value: -3.0}

# =============================================================================
# SAMPLER PROPERTIES
# =============================================================================
sampler:
  # Inference engines:
  #   ultranest, multinest, optimal_estimation,
  #   optimal_estimation_to_ultranest, optimal_estimation_to_multinest
  engine: ultranest

  # Shared nested-sampling controls. `dlogz` is UltraNest's dlogz and
  # MultiNest's evidence_tolerance.
  live_points: 400
  max_calls: null               # UltraNest: null runs to convergence; use a positive safety cap if needed.
  multinest_max_iterations: 0   # MultiNest only; 0 means unlimited.
  dlogz: 0.5
  sampling_efficiency: 0.8      # MultiNest: 0.8 parameter estimation, 0.3 evidence.
  importance_nested_sampling: true
  multimodal: true
  iterations_before_update: 100
  resume: resume                # MultiNest also supports overwrite; UltraNest has more modes.
  show_status: true
  seed: 2712
  invalid_loglike_floor: -1.0e100

  # Optimal-estimation phase controls, used by OE-only and OE-to-nested runs.
  oe_max_iterations: 8
  oe_convergence_tolerance: 1.0e-4
  oe_finite_difference_fraction: 1.0e-4
  oe_damping: 0.0
  # Optional correlated spline-temperature prior. Configure both or neither.
  # oe_temperature_prior_sigma_k: 250.0
  # oe_temperature_correlation_length_dex: 1.5

  # OE-to-nested prior handoff controls.
  prior_sigma: 4.0
  minimum_prior_fraction: 0.05
  require_oe_convergence: true

# =============================================================================
# PLOTTING AND POST-PROCESSING
# =============================================================================
plotting:
  enabled: false                 # Automatically plot after successful inference/forward modelling.
  retrieval: true
  forward: true
  style: default                 # Matplotlib style name or path to a .mplstyle file.
  image_format: png              # png, pdf, or svg.
  dpi: 180
  max_posterior_samples: 20000   # Plotting limit; statistics always use all samples.
  posterior_predictive_samples: 200 # Forward calls for spectral and T-P envelopes.
  posterior_predictive_seed: 0
  corner_max_parameters: 20      # Larger states retain marginals/correlation only.
  dataset_colors:                # Optional dataset-name overrides.
    f322w2: "#20639b"
    f444w: "#ef5675"
    lrs: "#2ca25f"
  parameter_labels: {}           # Optional parameter-name to display-label mapping.
  leave_one_out:
    enabled: false               # PSIS-LOO pointwise predictive diagnostic for retrievals.
    max_posterior_draws: 2000    # Forward-model evaluations; weighted chains are reproducibly resampled.
    seed: 0                      # Seed for equal-weight posterior resampling/subsampling.
    pareto_k_threshold: null     # null uses ArviZ's sample-size threshold; 0.7 reproduces Welbanks et al. (2023).

runtime:
  mpi_processes: auto
