extends: wasp69b_mie_catalog_pg14_R1000.yaml

run:
  name: wasp80b-mie-catalog-pg14-R1000
  description: WASP-80b one-region MgSiO3 Mie cloud with fixed catalogue optical constants and PG14 temperature profile.

bodies:
  planet:
    name: WASP-80b
    radius_m: 69946912.60943891
    mass_kg: 1.02119394e27
  star:
    name: WASP-80
    radius_m: 407680200.0
    effective_temperature_k: 4145.0
    log_g_cgs: 4.66
    metallicity_dex: -0.14
    spectrum_model: phoenix

observations:
  loader: wiser2025_wasp80b
  path: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-code/data/wasp80b_wiser2025
  datasets: [f322w2, f444w, lrs]
  miri_offset_parameter: null

atmosphere:
  chemistry:
    constant_log10_vmr_parameters: null
    species:
      - {label: H2O, fastchem_name: H2O1}
      - {label: CO2, fastchem_name: C1O2}
      - {label: CO,  fastchem_name: C1O1}
      - {label: CH4, fastchem_name: C1H4}
      - {label: NH3, fastchem_name: H3N1}
      - {label: HCN, fastchem_name: C1H1N1_1}
      - {label: H2,  fastchem_name: H2}
      - {label: He,  fastchem_name: He}

opacity:
  species: [H2O, CO2, CO, CH4, NH3, HCN]
  cache_directory: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-cache/wasp80b_native_modes

parameters:
  - {name: metallicity, label: '[M/H]', unit: dex, prior: {type: uniform, lower: 0.0, upper: 2.0}}
  - {name: CtoO, label: C/O, prior: {type: uniform, lower: 0.05, upper: 1.5}}
  - {name: kappa_IR, unit: m2 kg-1, prior: {type: log_uniform, lower: 1.0e-5, upper: 1.0}}
  - {name: gamma1, prior: {type: log_uniform, lower: 1.0e-2, upper: 100.0}}
  - {name: gamma2, prior: {type: log_uniform, lower: 1.0e-2, upper: 100.0}}
  - {name: T_irr, unit: K, prior: {type: uniform, lower: 800.0, upper: 2200.0}}
  - {name: alpha, prior: {type: uniform, lower: 0.0, upper: 1.0}}
  - {name: log_cloud_mass_fraction, prior: {type: uniform, lower: -12.0, upper: -2.0}}
  - {name: log_cloud_radius_micron, prior: {type: uniform, lower: -3.0, upper: 1.0}}
  - {name: log_cloud_top_pressure_bar, prior: {type: uniform, lower: -6.0, upper: -2.0}}
  - {name: log_cloud_base_pressure_bar, prior: {type: uniform, lower: -1.0, upper: 2.0}}

outputs:
  directory: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-runs/wasp80b_mie_catalog_pg14_R1000
runtime:
  scratch_directory: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-work/wasp80b_mie_catalog_pg14_R1000
