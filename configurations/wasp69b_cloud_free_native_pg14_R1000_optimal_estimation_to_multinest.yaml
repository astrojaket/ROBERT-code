extends: wasp69b_cloud_free_native_pg14_R1000.yaml

run:
  name: wasp69b-cloud-free-native-pg14-R1000-optimal-estimation-to-multinest
  description: Cloud-free PG14 benchmark using optimal estimation to initialize MultiNest.

sampler:
  engine: optimal_estimation_to_multinest
  oe_max_iterations: 8
  prior_sigma: 4.0
  minimum_prior_fraction: 0.05
  require_oe_convergence: true
  multinest_max_iterations: 0
  resume: resume
