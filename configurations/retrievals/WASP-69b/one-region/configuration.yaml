extends: ../../../wasp69b_mie_catalog_pg14_R1000.yaml

run:
  name: one-region
  description: WASP-69b homogeneous one-region MgSiO3 cloud retrieval using the complete native spectrum.

observations:
  datasets: [f322w2, avg, f444w, lrs]

disk_emission:
  model: one_region

sampler:
  engine: multinest
  multinest_max_iterations: 0
  resume: resume
  show_status: false
  seed: 6902

runtime:
  mpi_processes: 128

plotting:
  enabled: true
