extends: ../../../wasp69b_mie_direct_nk_pg14_R1000.yaml

run:
  name: n-k
  description: WASP-69b homogeneous one-region direct-n/k Mie cloud retrieval using the complete native spectrum.

observations:
  datasets: [f322w2, avg, f444w, lrs]

disk_emission:
  model: one_region

sampler:
  engine: multinest
  live_points: 1000
  multinest_max_iterations: 0
  resume: resume
  show_status: false
  seed: 6905

runtime:
  mpi_processes: 128

plotting:
  enabled: true
