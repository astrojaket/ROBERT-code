    # The knots are layer centres, while radiative transfer also evaluates the
    # two bounding pressure edges. Hold the endpoint temperatures constant
    # across those outer half-layers.
    extrapolation: clip

parameters:
  # Parameters shared with the completed PG14 MultiNest run are initialized
  # from its best fit and use its posterior covariance in the deferred handoff.
  - {name: metallicity, label: '[M/H]', unit: dex, prior: {type: uniform, lower: 0.0, upper: 2.0}, value: 1.0}
  - {name: CtoO, label: C/O, prior: {type: uniform, lower: 0.05, upper: 1.5}, value: 0.775}
  - {name: log_SO2, label: log10(SO2 VMR), prior: {type: uniform, lower: -10.0, upper: -4.0}, value: -7.0}

  # The handoff runner replaces these placeholders with the completed
