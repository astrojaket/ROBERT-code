sampler:
  engine: optimal_estimation
  oe_max_iterations: 12
  oe_convergence_tolerance: 1.0e-4
  oe_finite_difference_fraction: 1.0e-4
  oe_damping: 1.0e-3
  # Exponential smoothing covariance:
  # S_ij = sigma_T^2 exp(-|log10(P_i/P_j)| / correlation_length_dex).
  oe_temperature_prior_sigma_k: 250.0
  oe_temperature_correlation_length_dex: 1.5


runtime:
  mpi_processes: 1
