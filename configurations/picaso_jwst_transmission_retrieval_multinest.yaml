schema_version: 2

paths:
  observations_directory: ../examples/outputs/picaso_jwst_transmission_retrieval/picaso_jwst_asimov_observation.npz
  k_table_directory: ../opacity_data/exomol_xsec

run:
  name: picaso-jwst-transmission-retrieval
  description: >-
    End-to-end ROBERT retrieval of an independent official-PICASO deck-and-haze
    transmission spectrum on a JWST-like NIRISS/SOSS, NIRSpec/G395H, and
    MIRI/LRS grid. The observation is an Asimov data set with realistic
    uncertainties, so recovered shifts isolate cross-code model bias.

bodies:
  planet:
    name: PICASO benchmark hot Jupiter b
    radius_m: 75567044.0
    mass_kg: 7.2039590563e26
  star:
    name: PICASO benchmark K dwarf
    radius_m: 565604100.0
    effective_temperature_k: 4715.0
    log_g_cgs: 4.5
    metallicity_dex: 0.0
    spectrum_model: blackbody

observations:
  loader: robert_npz
  datasets: [picaso_asimov]
  verify_checksum: false
  miri_offset_parameter: null
  dataset_options: {}

atmosphere:
  pressure:
    bottom_bar: 10.0
    top_bar: 1.0e-5
    layers: 48
  temperature:
    model: isothermal
    temperature_k: 1100.0
  chemistry:
    model: free
    species: [H2O, CO, CO2, CH4]
    parameter_mode: log10
    parameter_names:
      H2O: log_H2O
      CO: log_CO
      CO2: log_CO2
      CH4: log_CH4
    fixed_mixing_ratios: {}
    background_species: [H2, He]
    background_fractions: [0.84, 0.16]
    fill_background: true
    excess_policy: raise

clouds:
  model: deck_haze
  log10_cloud_top_pressure_bar_parameter: log_cloud_top_pressure_bar
  log10_cloud_optical_depth_parameter: log_cloud_optical_depth
  log10_haze_mass_extinction_parameter: log_haze_mass_extinction
  haze_slope_parameter: haze_slope
  haze_reference_wavelength_micron: 1.0
  deck_single_scattering_albedo: 0.0
  deck_asymmetry_factor: 0.0
  haze_single_scattering_albedo: 1.0
  haze_asymmetry_factor: 0.0
  multiple_scattering_backend: sh4

opacity:
  format: exomol_cross_section_hdf
  resolution: R100
  species: [H2O, CO, CO2, CH4]
  binning:
    num: 100
    use_rebin: false
    remove_zeros: true
    g_points: 8

radiative_transfer:
  model: transmission
  include_rayleigh: true
  gas_combination: random_overlap
  reference_pressure_bar: 10.0
  radius_scale_parameter: radius_scale
  gravity_model: inverse_square
  impact_quadrature_order: 6

likelihood:
  model: gaussian
  include_normalization: true

parameters:
  - name: log_H2O
    label: log10 H2O VMR
    value: -3.0
    prior: {type: uniform, lower: -4.0, upper: -2.0}
  - name: log_CO
    label: log10 CO VMR
    value: -3.5228787453
    prior: {type: uniform, lower: -4.5, upper: -2.5}
  - name: log_CO2
    label: log10 CO2 VMR
    value: -4.6989700043
    prior: {type: uniform, lower: -5.7, upper: -3.7}
  - name: log_CH4
    label: log10 CH4 VMR
    value: -5.3979400087
    prior: {type: uniform, lower: -6.4, upper: -4.4}
  - name: radius_scale
    label: 10-bar reference-radius scale
    value: 1.0
    prior: {type: uniform, lower: 0.995, upper: 1.005}
  - name: log_cloud_top_pressure_bar
    label: log10 cloud-top pressure (bar)
    value: -3.0
    prior: {type: uniform, lower: -4.0, upper: -2.0}
  - name: log_cloud_optical_depth
    label: log10 cloud-deck optical depth
    value: -0.5228787453
    prior: {type: uniform, lower: -1.2, upper: 0.2}
  - name: log_haze_mass_extinction
    label: log10 haze mass extinction (cm2/g)
    value: -3.0
    prior: {type: uniform, lower: -4.2, upper: -2.0}
  - name: haze_slope
    label: Haze wavelength slope
    value: -4.0
    prior: {type: uniform, lower: -6.0, upper: -2.0}

sampler:
  engine: multinest
  live_points: 50
  multinest_max_iterations: 0
  dlogz: 0.5
  sampling_efficiency: 0.8
  importance_nested_sampling: true
  multimodal: false
  iterations_before_update: 50
  resume: overwrite
  show_status: true
  seed: 2718


plotting:
  enabled: true
  retrieval: true
  forward: true
  style: default
  image_format: png
  dpi: 180
  max_posterior_samples: 20000
  dataset_colors: {picaso_asimov: "#2471a3"}
  parameter_labels:
    log_H2O: log10 H2O VMR
    log_CO: log10 CO VMR
    log_CO2: log10 CO2 VMR
    log_CH4: log10 CH4 VMR
    radius_scale: 10-bar reference-radius scale
    log_cloud_top_pressure_bar: log10 cloud-top pressure (bar)
    log_cloud_optical_depth: log10 cloud-deck optical depth
    log_haze_mass_extinction: log10 haze mass extinction (cm2/g)
    haze_slope: Haze wavelength slope

runtime:
  mpi_processes: 2
