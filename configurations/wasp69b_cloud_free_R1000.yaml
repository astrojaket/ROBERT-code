# ROBERT cloud-free emission retrieval: WASP-69b NIRCam + MIRI native modes.
# Paths below are explicit DiRAC paths. Copy this file for each science run.
schema_version: 2

run:
  name: wasp69b-cloud-free-native-modes-R1000
  description: Cloud-free equilibrium-chemistry emission retrieval

bodies:
  planet:
    name: WASP-69b
    radius_m: 75781520.0       # 1.06 R_Jup
    mass_kg: 4.935138e26       # 0.26 M_Jup; gravity is calculated from M and R
  star:
    name: WASP-69
    radius_m: 565568100.0      # 0.813 R_Sun
    effective_temperature_k: 4750.0
    log_g_cgs: 4.5
    metallicity_dex: 0.15
    spectrum_model: phoenix    # Alternative: blackbody

observations:
  loader: schlawin2024_wasp69b
  path: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-code/data/wasp69b_schlawin2024
  datasets: [f322w2, f444w, lrs]  # Native NIRCam modes plus MIRI/LRS
  verify_checksum: true
  miri_offset_parameter: null

atmosphere:
  pressure:
    bottom_bar: 100.0
    top_bar: 1.0e-6
    layers: 80
  temperature:
    model: parmentier_guillot_2014
    internal_temperature_k: 100.0
  chemistry:
    model: fastchem_equilibrium
    fastchem_path: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-code/data/chemistry/fastchem
    metallicity_parameter: metallicity
    carbon_to_oxygen_parameter: CtoO
    # "label" is ROBERT's molecule name; "fastchem_name" is FastChem's name.
    species:
      - {label: H2O, fastchem_name: H2O1}
      - {label: CO2, fastchem_name: C1O2}
      - {label: CO,  fastchem_name: C1O1}
      - {label: CH4, fastchem_name: C1H4}
      - {label: NH3, fastchem_name: H3N1}
      - {label: HCN, fastchem_name: C1H1N1_1}
      - {label: H2,  fastchem_name: H2}
      - {label: He,  fastchem_name: He}

clouds:
  model: none

opacity:
  format: exomol_kta
  path: /lustre/dirac3/scratch/dp448/dc-tayl1/ktables_exomol
  resolution: R1000          # Change to R15000 to select that directory/file suffix
  species: [H2O, CO2, CO, CH4, NH3, HCN]
  cache_directory: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-cache/wasp69b_native_modes
  binning:
    num: 300
    use_rebin: false
    remove_zeros: true

radiative_transfer:
  model: emission
  geometry:
    model: normal_emission   # Alternative: gauss_legendre_disk
    points: 4                # Used only by gauss_legendre_disk
  include_rayleigh: true
  gas_combination: random_overlap
  thermal_integration_backend: auto

likelihood:
  model: gaussian
  include_normalization: true

parameters:
  - name: metallicity
    label: log10(Z/Z_sun)
    unit: dex
    prior: {type: uniform, lower: -1.0, upper: 2.0}
    value: 0.5               # Forward model value; retrieval ignores value
  - name: CtoO
    label: C/O
    prior: {type: uniform, lower: 0.0, upper: 1.0}
    value: 0.5
  - name: kappa_IR
    unit: m2 kg-1
    prior: {type: log_uniform, lower: 1.0e-5, upper: 1.0}
    value: 0.00316
  - name: gamma1
    prior: {type: log_uniform, lower: 1.0e-4, upper: 100.0}
    value: 0.1
  - name: gamma2
    prior: {type: log_uniform, lower: 1.0e-4, upper: 100.0}
    value: 0.1
  - name: T_irr
    unit: K
    prior: {type: uniform, lower: 800.0, upper: 2200.0}
    value: 1500.0
  - name: alpha
    prior: {type: uniform, lower: 0.0, upper: 1.0}
    value: 0.5

sampler:
  engine: ultranest
  live_points: 400
  max_calls: null
  dlogz: 0.5
  resume: resume
  show_status: true
  seed: 20260712

outputs:
  directory: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-runs/wasp69b_cloud_free_R1000_400live

runtime:
  mpi_processes: auto        # Uses SLURM_NTASKS; one process in the terminal
  scratch_directory: /lustre/dirac3/scratch/dp448/dc-tayl1/ROBERT-work/wasp69b_cloud_free_R1000
