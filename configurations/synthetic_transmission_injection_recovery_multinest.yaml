schema_version: 2

run:
  name: synthetic-transmission-injection-recovery
  description: >-
    Deterministic cloud-free transit-depth injection recovery using the real
    ExoMolOP POKAZATEL H2O R=15000 cross-section database.

bodies:
  planet:
    name: Synthetic hot Jupiter b
    radius_m: 80000000.0
    mass_kg: 1.1502935e27
  star:
    name: Synthetic K dwarf
    radius_m: 600000000.0
    effective_temperature_k: 5000.0
    log_g_cgs: 4.5
    metallicity_dex: 0.0
    spectrum_model: blackbody

observations:
  loader: robert_npz
  path: ../examples/outputs/synthetic_transmission_injection_recovery/synthetic_transmission_observation.npz
  datasets: [synthetic_transit]
  verify_checksum: false
  miri_offset_parameter: null
  dataset_options: {}

atmosphere:
  pressure:
    bottom_bar: 10.0
    top_bar: 1.0e-7
    layers: 48
  temperature:
    model: isothermal
    temperature_k: 1100.0
  chemistry:
    model: free
    species: [H2O]
    parameter_mode: log10
    parameter_names: {H2O: log_H2O}
    fixed_mixing_ratios: {}
    background_species: [H2, He]
    background_fractions: [0.8547, 0.1453]
    fill_background: true
    excess_policy: raise

clouds:
  model: none

opacity:
  format: exomol_cross_section_hdf
  path: ../opacity_data/exomol_xsec
  resolution: R100
  species: [H2O]
  cache_directory: ../examples/outputs/synthetic_transmission_injection_recovery/opacity_cache
  binning:
    num: 100
    use_rebin: false
    remove_zeros: true
    g_points: 8

radiative_transfer:
  model: transmission
  include_rayleigh: true
  gas_combination: random_overlap
  reference_pressure_bar: 1.0
  radius_scale_parameter: radius_scale
  gravity_model: inverse_square
  impact_quadrature_order: 6

likelihood:
  model: gaussian
  include_normalization: true

parameters:
  - name: log_H2O
    label: log10 H2O VMR
    value: -3.3
    prior: {type: uniform, lower: -5.0, upper: -2.0}
  - name: radius_scale
    label: Reference-radius scale
    value: 1.003
    prior: {type: uniform, lower: 0.985, upper: 1.015}

sampler:
  engine: multinest
  live_points: 40
  multinest_max_iterations: 0
  dlogz: 0.5
  sampling_efficiency: 0.8
  importance_nested_sampling: true
  multimodal: false
  iterations_before_update: 40
  resume: overwrite
  show_status: true
  seed: 2715

outputs:
  directory: ../examples/outputs/synthetic_transmission_injection_recovery

plotting:
  enabled: true
  retrieval: true
  forward: true
  style: default
  image_format: png
  dpi: 180
  max_posterior_samples: 20000
  dataset_colors: {synthetic_transit: "#2a6fbb"}
  parameter_labels:
    log_H2O: log10 H2O VMR
    radius_scale: Reference-radius scale

runtime:
  mpi_processes: 2
  scratch_directory: ../examples/outputs/synthetic_transmission_injection_recovery/scratch
