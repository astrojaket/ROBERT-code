name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality and package build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install development package
        run: python -m pip install -e ".[dev,perf,opacity,diagnostics]"

      - name: Lint
        run: ruff check .

      - name: Test with coverage floor
        run: |
          coverage run -m pytest
          coverage report

      - name: Build distributions
        run: python -m build

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            run-examples: false
          - python-version: "3.11"
            run-examples: false
          - python-version: "3.12"
            run-examples: false
          - python-version: "3.13"
            run-examples: true
          - python-version: "3.14"
            run-examples: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run examples
        if: matrix.run-examples
        run: |
          python examples/plot_blackbody_reference.py
          python examples/plot_temperature_profile_families.py
          python examples/plot_free_chemistry_profiles.py
          python run_retrieval.py --config configurations/wasp69b_cloud_free_R1000.yaml --validate-only
          ROBERT_BENCH_REPEAT=3 ROBERT_BENCH_WARMUP=1 python examples/benchmark_atmosphere_build.py
          ROBERT_OPACITY_IO_REPEAT=3 ROBERT_OPACITY_IO_WARMUP=1 python examples/benchmark_opacity_archive_io.py

  opacity-integration:
    name: exo_k correlated-k integration
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install opacity dependencies
        run: python -m pip install -e ".[dev,opacity]"

      - name: Test exo_k binning bridge
        env:
          NUMBA_CACHE_DIR: /tmp/robert-numba-cache
        run: python -m pytest tests/test_opacity_kta.py -k exok
