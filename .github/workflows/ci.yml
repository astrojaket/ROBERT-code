name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run examples
        run: |
          python examples/stub_emission_retrieval.py
          python examples/minimal_forward_model.py
          python examples/plot_blackbody_reference.py
          python examples/plot_temperature_profile_families.py
          python examples/plot_free_chemistry_profiles.py
          python examples/build_atmosphere_from_config.py
          ROBERT_BENCH_REPEAT=3 ROBERT_BENCH_WARMUP=1 python examples/benchmark_atmosphere_build.py
          ROBERT_OPACITY_IO_REPEAT=3 ROBERT_OPACITY_IO_WARMUP=1 python examples/benchmark_opacity_archive_io.py
